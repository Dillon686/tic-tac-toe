<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac SNOW</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div id="main-container">
    <div id="header">
      <h1>TIC TAC SNOW</h1>
    </div>
    <div id="left-sidebar">
      <button>Start Game</button>
    </div>
    <div id="game-grid">
      <div id="cell-1" class="grid-cell"></div>
      <div id="cell-2" class="grid-cell"></div>
      <div id="cell-3" class="grid-cell"></div>
      <div id="cell-4" class="grid-cell"></div>
      <div id="cell-5" class="grid-cell"></div>
      <div id="cell-6" class="grid-cell"></div>
      <div id="cell-7" class="grid-cell"></div>
      <div id="cell-8" class="grid-cell"></div>
      <div id="cell-9" class="grid-cell"></div>
    </div>
    <div id="footnote">Background Photo by <a href="https://unsplash.com/@8moments?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Simon Berger</a> on <a href="https://unsplash.com/backgrounds/nature/snow?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a></div>
  </div>
</body>
</html>
